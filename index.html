<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>O Despertar do Olfato</title>
<meta name="theme-color" content="#3B2A1E" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://cdnjs.cloudflare.com" />
<style>
  @font-face { font-family: 'PlayfairFallback'; src: local('Georgia'); }

  :root{
    --parchment: #EFE6D0;
    --parchment-deep: #E1D3AE;
    --ink: #3B2A1E;
    --ink-soft: #5c4a38;
    --wine: #7A2E2E;
    --gold: #B08D3F;
    --sage: #6E7C57;
    --paper-shadow: rgba(59,42,30,0.25);
  }

  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--ink);
    color:var(--ink);
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    overflow:hidden;
  }
  #app{ position:relative; height:100vh; width:100vw; }

  /* ---------- COVER ---------- */
  #cover{
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(176,141,63,0.18), transparent 60%),
      linear-gradient(180deg, #3B2A1E 0%, #2b1f16 100%);
    display:flex; align-items:center; justify-content:center;
    z-index:50;
    transition: opacity .9s ease, transform .9s ease;
  }
  #cover.hide{ opacity:0; transform: scale(1.03); pointer-events:none; }
  .cover-card{
    width:min(86vw, 420px);
    aspect-ratio: 3/4.4;
    background: var(--parchment);
    border-radius:2px;
    box-shadow: 0 30px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(176,141,63,0.4);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding: 8%;
    position:relative;
    animation: rise 1.1s cubic-bezier(.19,1,.22,1);
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(28px);} to{opacity:1; transform:translateY(0);} }
  .cover-card::before{
    content:"";
    position:absolute; inset:14px;
    border: 1px solid rgba(122,46,46,0.35);
  }
  .cover-eyebrow{
    letter-spacing:.32em; font-size:.62rem; text-transform:uppercase;
    color:var(--wine); font-family: Georgia, serif; margin-bottom: 1.1rem;
  }
  .cover-title{
    font-family: 'Playfair Display', Georgia, serif;
    font-weight:700; font-size: clamp(2rem, 8vw, 2.6rem);
    line-height:1.05; color:var(--ink); margin:0;
  }
  .cover-rule{ width:46px; height:1px; background:var(--gold); margin: 1.1rem 0; }
  .cover-sub{
    font-size:.92rem; font-style:italic; color:var(--ink-soft);
    max-width: 80%; line-height:1.5; margin:0 0 1.4rem;
  }
  .cover-author{ font-size:.78rem; letter-spacing:.08em; color:var(--wine); }
  .cover-tap{
    position:absolute; bottom:9%; left:0; right:0;
    font-size:.68rem; letter-spacing:.2em; text-transform:uppercase;
    color: var(--parchment); opacity:.55;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.35;} 50%{opacity:.85;} }

  /* ---------- CHROME ---------- */
  #chrome{
    position:absolute; inset:0; display:flex; flex-direction:column;
    background: var(--parchment);
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: max(12px, env(safe-area-inset-top)) 14px 10px;
    background: var(--parchment);
    border-bottom: 1px solid rgba(122,46,46,0.18);
    z-index:5;
  }
  .icon-btn{
    background:none; border:none; cursor:pointer;
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    color: var(--ink); border-radius:50%;
  }
  .icon-btn:active{ background: rgba(122,46,46,0.12); }
  .icon-btn svg{ width:20px; height:20px; }
  #hdr-title{
    font-family:'Playfair Display', Georgia, serif; font-size:.95rem; color:var(--ink);
    text-align:center; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 8px;
  }

  #viewer-wrap{ flex:1; position:relative; overflow:hidden; background:#d8c9a3; }
  #viewer{
    position:absolute; inset:0; overflow:auto; -webkit-overflow-scrolling:touch;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    padding: 18px 0 90px;
  }
  .page-canvas-holder{
    box-shadow: 0 8px 24px rgba(59,42,30,0.35);
    background:white;
  }
  canvas{ display:block; }

  #loading{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; color:var(--ink-soft); font-style:italic; font-size:.9rem; background:var(--parchment);
    z-index:3;
  }
  .spinner{
    width:26px; height:26px; border-radius:50%;
    border: 2px solid rgba(122,46,46,0.25); border-top-color: var(--wine);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- FOOTER / PROGRESS ---------- */
  footer{
    position:absolute; left:0; right:0; bottom:0;
    padding: 8px 16px max(10px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, var(--parchment) 60%, transparent);
    display:flex; flex-direction:column; gap:6px;
    z-index:4;
  }
  #progress-track{
    height:2px; background: rgba(122,46,46,0.2); border-radius:2px; position:relative; overflow:hidden;
  }
  #progress-fill{
    position:absolute; left:0; top:0; bottom:0; background: var(--wine); width:0%;
    transition: width .25s ease;
  }
  #page-readout{
    text-align:center; font-size:.72rem; letter-spacing:.05em; color: var(--ink-soft);
  }

  /* ---------- TOC DRAWER ---------- */
  #scrim{
    position:absolute; inset:0; background:rgba(30,20,12,0.45); opacity:0; pointer-events:none;
    transition: opacity .3s ease; z-index:20;
  }
  #scrim.show{ opacity:1; pointer-events:auto; }
  #toc{
    position:absolute; top:0; bottom:0; left:0; width:min(84vw, 320px);
    background: #2b1f16; color: var(--parchment);
    transform: translateX(-100%); transition: transform .35s cubic-bezier(.19,1,.22,1);
    z-index:21; display:flex; flex-direction:column;
    box-shadow: 8px 0 30px rgba(0,0,0,0.4);
  }
  #toc.show{ transform: translateX(0); }
  #toc-head{
    padding: max(20px, env(safe-area-inset-top)) 20px 14px;
    border-bottom: 1px solid rgba(176,141,63,0.25);
  }
  #toc-head h2{
    font-family:'Playfair Display', Georgia, serif; font-size:1.15rem; margin:0 0 4px; color:var(--parchment);
  }
  #toc-head span{ font-size:.72rem; color: rgba(239,230,208,0.55); letter-spacing:.05em; }
  #toc-list{ flex:1; overflow-y:auto; padding: 8px 0; }
  .toc-item{
    display:flex; align-items:baseline; gap:12px;
    padding: 12px 20px; cursor:pointer; border-bottom: 1px solid rgba(176,141,63,0.08);
  }
  .toc-item:active{ background: rgba(176,141,63,0.12); }
  .toc-num{ font-size:.68rem; color: var(--gold); letter-spacing:.1em; min-width:20px; }
  .toc-label{ font-size:.92rem; line-height:1.3; font-family: Georgia, serif; }
  .toc-item.active .toc-label{ color: var(--gold); }

  /* ---------- THEME SHEET ---------- */
  #theme-sheet{
    position:absolute; left:0; right:0; bottom:0;
    background: var(--parchment); border-radius: 16px 16px 0 0;
    padding: 18px 20px max(20px, env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .3s cubic-bezier(.19,1,.22,1);
    z-index:21; box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
  }
  #theme-sheet.show{ transform: translateY(0); }
  #theme-sheet h3{ font-family:'Playfair Display', Georgia, serif; font-size:1rem; margin:0 0 14px; }
  .theme-row{ display:flex; gap:10px; margin-bottom:14px; }
  .theme-opt{
    flex:1; border-radius:10px; padding:12px 8px; text-align:center; font-size:.78rem;
    border:1px solid rgba(122,46,46,0.25); cursor:pointer; letter-spacing:.03em;
  }
  .theme-opt.active{ border-color: var(--wine); background: rgba(122,46,46,0.08); color: var(--wine); }
  .zoom-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; }
  .zoom-row button{
    width:40px; height:40px; border-radius:50%; border:1px solid rgba(122,46,46,0.3);
    background:none; font-size:1.1rem; color:var(--wine); cursor:pointer;
  }
  .zoom-label{ font-size:.8rem; color:var(--ink-soft); }

  /* dark reading theme */
  body.theme-dark #viewer-wrap{ background:#181310; }
  body.theme-dark header, body.theme-dark footer, body.theme-dark #chrome{ background:#221a14; color:#EFE6D0; }
  body.theme-dark #hdr-title{ color:#EFE6D0; }
  body.theme-dark .icon-btn{ color:#EFE6D0; }
  body.theme-dark #page-readout{ color:#c9bba3; }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>
<div id="app">

  <!-- COVER -->
  <div id="cover">
    <div class="cover-card">
      <div class="cover-eyebrow">Guia de Perfumaria</div>
      <h1 class="cover-title">O Despertar<br/>do Olfato</h1>
      <div class="cover-rule"></div>
      <p class="cover-sub">Um guia para apreciar perfume, com repertório e sensibilidade</p>
      <div class="cover-author">by Matteo Provenzani</div>
    </div>
    <div class="cover-tap">toque para abrir</div>
  </div>

  <!-- READER CHROME -->
  <div id="chrome">
    <header>
      <button class="icon-btn" id="btn-toc" aria-label="Sumário">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="14" y2="17"/></svg>
      </button>
      <div id="hdr-title">O Despertar do Olfato</div>
      <button class="icon-btn" id="btn-theme" aria-label="Ajustes de leitura">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      </button>
    </header>

    <div id="viewer-wrap">
      <div id="loading">
        <div class="spinner"></div>
        <div>abrindo o livro…</div>
      </div>
      <div id="viewer" hidden></div>
    </div>

    <footer>
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div id="page-readout">— / —</div>
    </footer>
  </div>

  <div id="scrim"></div>

  <!-- TOC -->
  <nav id="toc">
    <div id="toc-head">
      <h2>Sumário</h2>
      <span id="toc-progress-label">0% concluído</span>
    </div>
    <div id="toc-list"></div>
  </nav>

  <!-- THEME SHEET -->
  <div id="theme-sheet">
    <h3>Leitura</h3>
    <div class="theme-row" id="theme-options">
      <div class="theme-opt active" data-theme="light">Papel</div>
      <div class="theme-opt" data-theme="sepia">Sépia</div>
      <div class="theme-opt" data-theme="dark">Noite</div>
    </div>
    <div class="zoom-row">
      <span class="zoom-label">Tamanho da página</span>
      <div style="display:flex; gap:8px;">
        <button id="zoom-out">–</button>
        <button id="zoom-in">+</button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  "use strict";
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  // ---- state (in-memory only) ----
  var state = {
    pdf: null,
    currentPage: 1,
    totalPages: 0,
    scale: 1.0,
    theme: 'light',
    pageEls: {},
    observer: null
  };

  // Sumário — index maps to a target PDF page (approx, based on printed page numbers + cover offset)
  var toc = [
    { num: "—", label: "Capa", page: 1 },
    { num: "01", label: "Fundamentos do Olfato", page: 4 },
    { num: "02", label: "A Anatomia de um Perfume", page: 8 },
    { num: "03", label: "A Linguagem Sensorial da Perfumaria", page: 12 },
    { num: "04", label: "O Grande Dicionário Sensorial de Acordes", page: 17 },
    { num: "05", label: "A Estrutura Técnica do Perfume", page: 24 },
    { num: "06", label: "O Nariz Treinado", page: 29 },
    { num: "07", label: "Lendo os Sites de Perfumaria", page: 33 },
    { num: "08", label: "Perfume Como Arte", page: 37 },
    { num: "09", label: "Apreciação na Prática", page: 41 },
    { num: "10", label: "Aplicação e Conservação", page: 44 },
    { num: "11", label: "Guia Rápido de Consulta", page: 46 },
    { num: "—", label: "Índice Remissivo", page: 50 }
  ];

  var els = {
    cover: document.getElementById('cover'),
    viewer: document.getElementById('viewer'),
    loading: document.getElementById('loading'),
    progressFill: document.getElementById('progress-fill'),
    pageReadout: document.getElementById('page-readout'),
    tocList: document.getElementById('toc-list'),
    tocProgress: document.getElementById('toc-progress-label'),
    toc: document.getElementById('toc'),
    scrim: document.getElementById('scrim'),
    themeSheet: document.getElementById('theme-sheet'),
    btnToc: document.getElementById('btn-toc'),
    btnTheme: document.getElementById('btn-theme'),
    themeOptions: document.getElementById('theme-options'),
    zoomIn: document.getElementById('zoom-in'),
    zoomOut: document.getElementById('zoom-out')
  };

  // ---- open book ----
  els.cover.addEventListener('click', openBook);
  function openBook(){
    els.cover.classList.add('hide');
    if(!state.pdf){ loadPdf(); }
  }

  function loadPdf(){
    pdfjsLib.getDocument('livro.pdf').promise.then(function(pdf){
      state.pdf = pdf;
      state.totalPages = pdf.numPages;
      buildToc();
      renderAllPages();
    }).catch(function(err){
      els.loading.innerHTML = '<div>Não foi possível abrir o PDF.<br/>Verifique se "livro.pdf" está na mesma pasta.</div>';
      console.error(err);
    });
  }

  function buildToc(){
    els.tocList.innerHTML = '';
    toc.forEach(function(item){
      var div = document.createElement('div');
      div.className = 'toc-item';
      div.dataset.page = item.page;
      div.innerHTML = '<span class="toc-num">' + item.num + '</span><span class="toc-label">' + item.label + '</span>';
      div.addEventListener('click', function(){
        goToPage(item.page);
        closeToc();
      });
      els.tocList.appendChild(div);
    });
  }

  function renderAllPages(){
    var container = els.viewer;
    var renderQueue = Promise.resolve();
    var pageWidth = Math.min(window.innerWidth - 24, 640);

    function renderPage(num){
      return state.pdf.getPage(num).then(function(page){
        var viewportBase = page.getViewport({ scale: 1 });
        var scale = (pageWidth / viewportBase.width) * state.scale;
        var viewport = page.getViewport({ scale: scale });

        var holder = document.createElement('div');
        holder.className = 'page-canvas-holder';
        holder.dataset.page = num;

        var canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        var ctx = canvas.getContext('2d');
        holder.appendChild(canvas);
        container.appendChild(holder);
        state.pageEls[num] = holder;

        return page.render({ canvasContext: ctx, viewport: viewport }).promise;
      });
    }

    for(var i=1; i<=state.totalPages; i++){
      (function(n){
        renderQueue = renderQueue.then(function(){ return renderPage(n); });
      })(i);
    }

    renderQueue.then(function(){
      els.loading.hidden = true;
      els.viewer.hidden = false;
      setupScrollTracking();
      updateReadout();
    });
  }

  function setupScrollTracking(){
    var wrap = document.getElementById('viewer-wrap');
    wrap.addEventListener('scroll', throttle(function(){
      var scrollTop = els.viewer.scrollTop;
      var viewportMid = scrollTop + wrap.clientHeight * 0.4;
      var closest = 1, closestDist = Infinity;
      Object.keys(state.pageEls).forEach(function(num){
        var el = state.pageEls[num];
        var dist = Math.abs(el.offsetTop - viewportMid);
        if(dist < closestDist){ closestDist = dist; closest = parseInt(num); }
      });
      state.currentPage = closest;
      updateReadout();
    }, 120));
  }

  function throttle(fn, wait){
    var last = 0, timer = null;
    return function(){
      var now = Date.now();
      var args = arguments;
      if(now - last >= wait){ last = now; fn.apply(null, args); }
      else{
        clearTimeout(timer);
        timer = setTimeout(function(){ last = Date.now(); fn.apply(null, args); }, wait - (now-last));
      }
    };
  }

  function updateReadout(){
    els.pageReadout.textContent = state.currentPage + ' / ' + state.totalPages;
    var pct = Math.round((state.currentPage / state.totalPages) * 100);
    els.progressFill.style.width = pct + '%';
    els.tocProgress.textContent = pct + '% concluído';

    document.querySelectorAll('.toc-item').forEach(function(item){
      item.classList.toggle('active', parseInt(item.dataset.page) === activeTocIndexFor(state.currentPage));
    });
  }

  function activeTocIndexFor(page){
    var best = toc[0].page;
    toc.forEach(function(t){ if(t.page <= page) best = t.page; });
    return best;
  }

  function goToPage(num){
    var el = state.pageEls[num];
    if(el){
      document.getElementById('viewer-wrap').scrollTo({ top: el.offsetTop - 12, behavior: 'smooth' });
    }
  }

  // ---- TOC drawer ----
  function openToc(){ els.toc.classList.add('show'); els.scrim.classList.add('show'); }
  function closeToc(){ els.toc.classList.remove('show'); els.scrim.classList.remove('show'); }
  els.btnToc.addEventListener('click', openToc);
  els.scrim.addEventListener('click', function(){ closeToc(); closeTheme(); });

  // ---- theme sheet ----
  function openTheme(){ els.themeSheet.classList.add('show'); els.scrim.classList.add('show'); }
  function closeTheme(){ els.themeSheet.classList.remove('show'); els.scrim.classList.remove('show'); }
  els.btnTheme.addEventListener('click', openTheme);

  els.themeOptions.addEventListener('click', function(e){
    var opt = e.target.closest('.theme-opt');
    if(!opt) return;
    Array.prototype.forEach.call(els.themeOptions.children, function(c){ c.classList.remove('active'); });
    opt.classList.add('active');
    var theme = opt.dataset.theme;
    document.body.classList.remove('theme-light','theme-sepia','theme-dark');
    document.body.classList.add('theme-' + theme);
    if(theme === 'sepia'){
      document.documentElement.style.setProperty('--parchment', '#EDE0C4');
    } else {
      document.documentElement.style.setProperty('--parchment', '#EFE6D0');
    }
  });

  els.zoomIn.addEventListener('click', function(){ rescale(0.1); });
  els.zoomOut.addEventListener('click', function(){ rescale(-0.1); });

  function rescale(delta){
    state.scale = Math.max(0.7, Math.min(1.6, state.scale + delta));
    els.viewer.innerHTML = '';
    state.pageEls = {};
    renderAllPages();
  }

  // register service worker for offline use
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
})();
</script>
</body>
</html>
